<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore Home Price Predictor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-blur"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-house-chimney-user text-gradient"></i>
                <span class="logo-text">BangPH</span>
            </div>
            <h1>Bengaluru Home Price Predictor</h1>
            <p class="subtitle">Estimate your property value using our advanced Machine Learning model trained on Bengaluru real estate data.</p>
        </header>

        <!-- Main Form Card -->
        <main class="main-card">
            <form id="predictionForm" onsubmit="return false;">
                
                <!-- Input Grid -->
                <div class="form-grid">
                    <!-- Square Feet -->
                    <div class="form-group full-width-sm">
                        <label for="uiSqft">
                            <i class="fa-solid fa-ruler-combined icon-accent"></i> Area (Square Feet)
                        </label>
                        <div class="input-wrapper">
                            <input class="area" type="number" id="uiSqft" name="Squareft" value="1000" min="100" max="50000" required>
                            <span class="input-suffix">sq.ft</span>
                        </div>
                    </div>

                    <!-- Location Selector -->
                    <div class="form-group full-width-sm">
                        <label for="uiLocations">
                            <i class="fa-solid fa-location-dot icon-accent"></i> Location
                        </label>
                        <div class="select-wrapper">
                            <select class="location" id="uiLocations" name="Location" required>
                                <option value="" disabled selected>Loading locations...</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-arrow"></i>
                        </div>
                    </div>
                </div>

                <!-- Switches Grid -->
                <div class="form-row">
                    <!-- BHK Selector -->
                    <div class="form-group half-width">
                        <label>
                            <i class="fa-solid fa-bed icon-accent"></i> Bedrooms (BHK)
                        </label>
                        <div class="switch-field">
                            <input type="radio" id="radio-bhk-1" name="uiBHK" value="1" />
                            <label for="radio-bhk-1">1</label>
                            <input type="radio" id="radio-bhk-2" name="uiBHK" value="2" checked />
                            <label for="radio-bhk-2">2</label>
                            <input type="radio" id="radio-bhk-3" name="uiBHK" value="3" />
                            <label for="radio-bhk-3">3</label>
                            <input type="radio" id="radio-bhk-4" name="uiBHK" value="4" />
                            <label for="radio-bhk-4">4</label>
                            <input type="radio" id="radio-bhk-5" name="uiBHK" value="5" />
                            <label for="radio-bhk-5">5</label>
                        </div>
                    </div>

                    <!-- Bathrooms Selector -->
                    <div class="form-group half-width">
                        <label>
                            <i class="fa-solid fa-bath icon-accent"></i> Bathrooms
                        </label>
                        <div class="switch-field">
                            <input type="radio" id="radio-bath-1" name="uiBathrooms" value="1" />
                            <label for="radio-bath-1">1</label>
                            <input type="radio" id="radio-bath-2" name="uiBathrooms" value="2" checked />
                            <label for="radio-bath-2">2</label>
                            <input type="radio" id="radio-bath-3" name="uiBathrooms" value="3" />
                            <label for="radio-bath-3">3</label>
                            <input type="radio" id="radio-bath-4" name="uiBathrooms" value="4" />
                            <label for="radio-bath-4">4</label>
                            <input type="radio" id="radio-bath-5" name="uiBathrooms" value="5" />
                            <label for="radio-bath-5">5</label>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button class="submit-btn" onclick="onClickedEstimatePrice()" type="button">
                    <span>Calculate Estimate</span>
                    <i class="fa-solid fa-calculator"></i>
                </button>

                <!-- Result Container -->
                <div id="uiEstimatedPrice" class="result-card">
                    <div class="result-placeholder">Enter details and click Calculate Estimate</div>
                </div>

            </form>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 BangPH Valuator. Modernized with <i class="fa-solid fa-heart text-danger"></i> for Bangalore House Price Prediction.</p>
        </footer>
    </div>
</body>
</html>
